<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – CollegeSaathi</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">College<span>Saathi</span></div>
    <div class="auth-tagline">🎓 Share rides to college with your classmates</div>

    {% if error %}
    <div class="alert alert-error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="post" autocomplete="on">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@college.edu"
               autocomplete="email" required autofocus />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••"
               autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem">
        Login →
      </button>
    </form>

    <hr class="auth-divider"/>
    <p class="auth-link">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
  </div>
</div>
</body>
</html>
